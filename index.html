<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue3 Demo</title>
    <!-- Importing Vue 3 via CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> 
</head>
<body>
    <div id="app">
        <button v-on:click="buttonClick('vue is exciting','Hello World', $event)">Click Me</button>
        <p>x:{{x}} and y : {{y}}</p>
    </div> 

    <script>
        const { createApp, ref, reactive } = Vue;
       
        createApp({
            setup(){
                let x = ref(0);
                let y = ref(0)

                function buttonClick(newMessage,newMessage1,event){
                    x.value = event.x;
                    y.value = event.y
                    alert(newMessage)
                    alert(newMessage1)
                }
               
                return {
                   
                buttonClick,
                x,
                y
                }
            }
        }).mount("#app")
    </script>

    
</body>
</html>
