<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue3 Demo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> 
</head>
<body>
    <div id="app">
         <h1>{{message}}</h1>
        <p v-for="(luckyNumber,index) in luckyNumbers
        "> {{index}}luckyNumber: {{luckyNumber}}</p>
        <hr>
        <p>Projects in Pipeline</p>
        <ul>
            <li v-for="(project,index) in employee.projects">
                <span>{{index+1}} - "{{project.project}}" timeline is - {{project.timeline}}</span>
            </li>
        </ul>
        <hr>
        <ul>
            <li v-for="(value,key) in employee">
                <span>{{key}}: {{value}}</span>
            </li>
        </ul>
         
        <p>{{employee.name}} is {{employee.age}} years old.</p>
        <p>His salary is {{employee.salary}}</p>
     
       
    </div>
    
</body>
<script>
    const { createApp, ref, reactive } = Vue;
    createApp({
        setup(){
            const message ="Hello Vue!";

            const luckyNumbers = [3,7,9,11,15];
            
            const employee=reactive({
                name: "John",
                age:30,
                salary:50000,
                hasCorporateCard: false,
                spendingLimit: 10000,
                yearsWithCompany: 5,
                projects: [
                    {project:"Green A", timeline:"2 years"},
                    {project: "Blue H", timeline: "9 months"},
                    {project:"Pink G", timeline: "3 years"},
                ], // array of objects

            });
            

            
           
            return{
                message,
                employee,
                luckyNumbers,
                
                
            }
        }
    }).mount("#app")
</script>
</html>
