<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue3 Demo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> 
</head>
<body>
    <div id="app">
        <!-- Binding style has 2 ways --> 
        <!--STEP 1--><div v-bind:style="{backgroundColor: 'aqua', fontSize: fontSizeTemp+ 'px'}">Hello World</div> 
        </div>
        <!--STEP 2-->
        <div v-bind:style="{'background-color': 'aqua', 'font-size': '40px'}">Hello World</div>

        <p  class="padding-medium" v-bind:class="{h2:true, 'bg-grey': true}" >Random Text</p>
    
</body>
<script>
    const { createApp, ref, reactive } = Vue;
    const fontSizeTemp = 60;
    createApp({
        setup(){
            
        
           
            return{
                fontSizeTemp, 
                
            }
        }
    }).mount("#app")
</script>
<style>
    .h1{
        font-size: 60px;
        color: green;
    }
    .h2{
        font-size: 40px;
        color: chocolate;
    }
    .bg-grey{
        background-color: grey;

    }
    .bg-green{
        background-color: lightgreen;
    }
    .padding-medium{
        padding:20px;
    }
</style>
</html>
