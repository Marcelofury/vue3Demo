<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue3 Demo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> 
</head>
<body>
    <div id="app">
        <h1>{{toUpperCase()}}</h1>
        <p>Lucky Number : {{luckyNumber}}</p>
        <p>Lucky Number is an {{luckyNumber%2==0?"even number": "odd number"}}</p>
        <p>{{updateLuckyNumber()}}</p>
        <p>Lucky Number List : {{luckyNumbers}}</p>
        <p>{{employee.salary}}</p>
    </div>
    
</body>
<script>
    const { createApp, ref, reactive } = Vue;
    createApp({
        setup(){
            const message ="Hello Vue!";
            let  luckyNumber = ref(6);
            const luckyNumbers = [3,7,9,11];
            const employee=reactive({
                name: "John",
                age:30,
                salary:50000,
            })
            function updateLuckyNumber(){
                setTimeout(()=>{
                    luckyNumber.value = 77;
                    // using ref needs .value but reactive is the opposite
                    // employee.value.salary = 80000;
                    // however reactive doesn't work on premitive data taypes like numbers, strings thus ref was established to overcome this
                    employee.salary = 80000;

                },2000)
                

            };
            function toUpperCase(){
                return message.toUpperCase();
            };
            return{
                message,
                luckyNumber,
                luckyNumbers,
                employee,
                updateLuckyNumber,
                toUpperCase,
            }
        }
    }).mount("#app")
</script>
</html>
