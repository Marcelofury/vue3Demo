<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> 
</head>
<body>
    <div id="app">
        <h1>{{toUpperCase()}}</h1>
        <p>Lucky Number : {{luckyNumber}}</p>
        <p>Lucky Number is an {{luckyNumber%2==0?"even number": "odd number"}}</p>
        <p>Random Number from 1-10: {{getRandomLuckyNumber()}}</p>
        <p>Lucky Number List : {{luckyNumbers}}</p>
        <p>{{employee}}</p>
    </div>
    
</body>
<script>
    const { createApp } = Vue;
    createApp({
        setup(){
            const message ="Hello Vue!";
            const luckyNumber = 7;
            const luckyNumbers = [3,7,9,11];
            const employee={
                name: "John",
                age:30,
                salary:50000,
            }
            function getRandomLuckyNumber(){
                return Math.floor(Math.random()*10)+1;

            };
            function toUpperCase(){
                return message.toUpperCase();
            };
            return{
                message,
                luckyNumber,
                luckyNumbers,
                employee,
                getRandomLuckyNumber,
                toUpperCase,
            }
        }
    }).mount("#app")
</script>
</html>
