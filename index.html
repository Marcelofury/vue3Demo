<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue3 Demo</title>
    <!-- Importing Bootstrap via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Importing Vue 3 via CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> 
</head>
<body>
    <div id="app" class="container">
        <form v-on:submit.prevent="handleSubmit">
        <div class="bg-info p-5 m-5">
            <div class="h2 text-center"> Learn Vue - Forms</div>
            <hr>
            <div class="input-group mb-3">
                <span class="input-group-text">Email</span>
                <input type="text" class="form-control " v-model.trim="formObj.email" >
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text">Name</span>
                <input type="text" class="form-control " v-model.trim="formObj.name" >
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text">Phone</span>
                <input type="number" class="form-control" v-model.number="formObj.phone" >
            </div>

            <div class="border p-1">
                <label class="form-label">Gender</label>
<br>
<div class="form-check form-check-inline">
    <input class="form-check-input" type="radio" v-model="formObj.gender" value="male" name="inlineRadioOptions"> Male</input>
    </div>

    <div class="form-check form-check-inline">
    <input class="form-check-input" type="radio" v-model="formObj.gender" value="female" name="inlineRadioOptions"> Female</input>
</div>
<br>
<hr>
<select  id="gender" v-model="formObj.gender" class="form-select">
    <option value="male">Male</option>
    <option value="female">Female</option>
</select>
</div>
            
            <div class="input-group mb-3">
                
                <input type="checkbox" class="form-check-input " v-model="formObj.subscribe" >
                <label class="form-check-label"> &nbsp;Subscribe to newsletter</label>
            </div>
           
            <div class="text-center pb-3">
                <button class="btn btn-secondary m-2 w-50" >Submit</button>
               
            </div>

            
            
        </div>
        </form>
        
    </div> 

    <script>
        const { createApp, ref, reactive , computed, watch} = Vue;
       
        createApp({
            setup(){
                const formObj = reactive({
                    email: "",
                    name:"",
                    phone:"",
                    subscribe: false,
                    gender:""
                })

                function handleSubmit(){
                    console.log(formObj)
                }
                return {
                   formObj,
                   handleSubmit
                }
            }
        }).mount("#app")
    </script>

    
</body>
</html>
