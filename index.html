<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> 
</head>
<body>
    <div id="vue3Demo">
        <h1>{{message}}</h1>
    </div>
    
</body>
<script>
    const {createApp} = vue;
    createApp({
        setup(){
            return{
                message: "Hello vue 3!"
            }
        }
    }).mount("#vue3Demo")
</script>
</html>
