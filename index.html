<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue3 Demo</title>
    <!-- Importing Vue 3 via CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> 
</head>
<body>
    <div id="app">
        
        <div>
       Learn vue
        </div>
        Name: 
        <input type="text" v-model.trim="name"> <br>
        <br>
        Age: 
        <input type="number" v-model.lazy="age">
        <p>  {{name}} is {{age}} years old</p>
    </div> 

    <script>
        const { createApp, ref, reactive } = Vue;
       
        createApp({
            setup(){
                let name = ref("Marcel");
                let age = ref(23);
                
                return {
                    name,
                    age
                   
               
                }
            }
        }).mount("#app")
    </script>

    
</body>
</html>
