<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> 
</head>
<body>
    <div id="app">
        <h1>{{message}}</h1>
        <p>Lucky Number : {{luckyNumber}}</p>
        <p>Lucky Number is an {{luckyNumber%2==0? "even number": "odd number"}}</p>
        <p>Random Number from 1-10: {{getRandomLuckyNumber()}}</p>
        <p>Lucky Number List : {{luckNumbers}}</p>
        <p>{{employee}}</p>
    </div>
    
</body>
<script>
    const {createApp} = vue;
    createApp({
        setup(){
            const message ="Hello Vue!";
            const luckyNumber = 7;
            const luckNumbers = [3,7,9,11];
            const employee={
                name: "John",
                age:30,
                salary:50000
            }
            function getRandomLuckyNumber(){
                return Math.floor(Math.random()*10)+1;

            }
            return{
                message,
                luckyNumber,
                luckNumbers,
                employee,
                getRandomLuckyNumber,
            }
        }
    }).mount("app")
</script>
</html>
