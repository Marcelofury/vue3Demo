<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue3 Demo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> 
</head>
<body>
    <div id="app">
         <h1>{{message}}</h1>
        <p v-for="(luckyNumber,index) in luckyNumbers
        "> {{index}}luckyNumber: {{luckyNumber}}</p>
         
        <p>{{employee.name}} is {{employee.age}} years old.</p>
        <p>His salary is {{employee.salary}}</p>
     
       
    </div>
    
</body>
<script>
    const { createApp, ref, reactive } = Vue;
    createApp({
        setup(){
            const message ="Hello Vue!";

            const luckyNumbers = [3,7,9,11,15];
            
            const employee=reactive({
                name: "John",
                age:30,
                salary:50000,
                hasCorporateCard: false,
                spendingLimit: 10000,
                yearsWithCompany: 5,
            });
            

            
           
            return{
                message,
                employee,
                luckyNumbers,
                
                
            }
        }
    }).mount("#app")
</script>
</html>
