<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue3 Demo</title>
    <!-- Importing Vue 3 via CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> 
</head>
<body>
    <div id="app">
        <div>Learn Vue</div>

        <p>{{counter}}</p>
        <p>{{getFullName}}</p>
        <button v-on:click="counter++">Increment</button>
        <button v-on:click="counter--"> Decrement</button>
        <br><br>
        First Name:
        <input type="text" v-model="firstName">
        
    </div> 

    <script>
        const { createApp, ref, reactive , computed} = Vue;
       
        createApp({
            setup(){
                let name = ref("Marcel");
                let age = ref(23);
                let counter = ref(0);

                let firstName = ref("Ben");
                let lastName = ref("Patel");

                const  getFullName =computed ((previous)=>{
                    console.log("previous value", previous);
                    if(previous == "Ben 1 Patel"){
                        console.log("Ben Patel -> Special case")
                    }
                    return firstName.value + " " + lastName.value;
                })
                
                return {
                    name,
                    age,
                    counter,
                    firstName,
                    lastName,
                    getFullName
                   
               
                }
            }
        }).mount("#app")
    </script>

    
</body>
</html>
